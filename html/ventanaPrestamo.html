<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Prestamo</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    
        <!---BLOQUE DE INSERCION DE DATOS--->

    <div class="main-wrapper">

        <div class="calculator-container">
            <h2>Calculadora de Prestamos</h2>

            <div class="input-group">
                <label>Prestamo ($)</label>
                <input type="number" id="prestamo" placeholder="Ej. 1000" min="0">
                <label>Intereses (%)</label>
                <input type="number" id="intereses" placeholder="Ej. 5" min="0">
                <label>Cuotas: (Meses)</label>
                <input type="number" id="cuotas" placeholder="Ej. 50" min="0">
            </div>

            <button class="btn-link" onclick="calculoPrestamo()">Calcular</button>
            
            <a href="../index.html" class="btn-link">Regresar al menu</a>
        </div>

        <!---BLOQUE DE RESUMEN INTERESES--->

        <div class="calculator-container summary-overlay" id="bloque-resumen">
            <h2>Resumen de Cuentas</h2>

            <div class="result result-visible" id="result">
                <h3>Calculo de Prestamo</h3>

                <div class="details">
                    <p>Prestamo Ingresado: <b id="prestamo_final">$0.00</b></p>
                    <hr>
                    
                    <p>Calculos: </p>
                    
                    <p>Cuota Mensual con Intereses: <b id="cuota_mensual">$0.00</b></p>
                    <p>Interes Mensual: <b id="interes_mensual">$0.00</b></p>
                    <p>Capital Mensual sin intereses: <b id="capital_mensual">$0.00</b></p>
                    <p>Nuevo Saldo: <b id="nuevo_saldo">$0.00</b></p>

                </div>
            </div>

            <button class="btn-link btn-mt-20" onclick="limpiarCampos()">Volver y Limpiar</button>
            <p></p>
        </div>

    </div>

    <script src="../javascripts/calculadoraPrestamos.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js');
            });
        }
    </script>
</body>
</html>
