<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Préstamos</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    
        <!---BLOQUE DE INSERCION DE DATOS--->

    <div class="main-wrapper">

        <div class="calculator-container">
            <h2>Calculadora de IVA & Pago a cuenta</h2>

            <div class="input-group">
                <label>Monto ($)</label>
                <input type="number" id="monto_ingresado" placeholder="Ej. 1000" min="0">
            </div>

            <div class="input-group">
                <label>IVA (%)</label>
                <input type="text" value="13%" disabled>
            </div>

            <div class="input-group">
                <label>Pago a Cuenta (%)</label>
                <input type="text" value="1.75%" disabled>
            </div>

            <button class="btn-link" onclick="calculoIvaPagoCuenta()">Calcular</button>
            
            <a href="../index.html" class="btn-link">Regresar al menu</a>
        </div>

        <!---BLOQUE DE RESUMEN INTERESES--->

        <div class="calculator-container summary-overlay" id="bloque-resumen">
            <h2>Resumen de Cuentas</h2>

            <div class="result result-visible" id="result">
                <h3>IVA & Pago a Cuenta</h3>

                <div class="details">
                    <p>Monto Ingresado: <b id="monto_final">$0.00</b></p>
                    <p>IVA: <b>13%</b></p>
                    <p>Pago a Cuenta: <b>1.75%</b></p>
                    <hr>
                    
                    <p>Calculo</p>
                    <p>IVA: <b id="iva_calculado">$0.00</b></p>
                    <p>Pago a Cuenta: <b id="pagocuenta_calculado">$0.00</b></p>
                    <p>Total a pagar: <b id="total_pagar">$0.00</b></p>
                </div>
            </div>

            <button class="btn-link btn-mt-20" onclick="limpiarCampos()">Volver y Limpiar</button>
        </div>

    </div>

    <script src="../javascripts/calculadoraIva.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js');
            });
        }
    </script>
</body>
</html>
